<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burgershot • Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">🍔 BURGERSHOT</div>
    <button onclick="logout()" class="btn">Sair</button>
  </nav>

  <div style="max-width:1200px; margin:40px auto; padding:0 5%;">
    <h1>Painel do Administrador</h1>
    
    <h2>Usuários Cadastrados</h2>
    <div id="users-list" style="margin-bottom:50px;"></div>

    <h2>Adicionar Novo Item ao Estoque</h2>
    <input id="item-nome" placeholder="Nome do item (ex: Hambúrguer)" style="padding:14px; width:400px; border-radius:999px; border:1px solid #ddd;">
    <button onclick="addItem()" class="btn btn-primary">Adicionar Item</button>
  </div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await checkAuth();
  loadUsers();
});
</script>
</body>
</html>
